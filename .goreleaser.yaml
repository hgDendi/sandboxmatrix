version: 2

project_name: sandboxmatrix

before:
  hooks:
    - go mod tidy

builds:
  - id: smx
    main: ./cmd/smx
    binary: smx
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/hg-dendi/sandboxmatrix/internal/cli.Version={{.Version}}
      - -X github.com/hg-dendi/sandboxmatrix/internal/cli.Commit={{.Commit}}
      - -X github.com/hg-dendi/sandboxmatrix/internal/cli.BuildDate={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: hg-dendi
    name: sandboxmatrix
