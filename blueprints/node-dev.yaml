apiVersion: smx/v1alpha1
kind: Blueprint
metadata:
  name: node-dev
  version: "1.0.0"
spec:
  base: node:22-slim
  runtime: docker
  resources:
    cpu: "2"
    memory: 2Gi
    disk: 10Gi
  setup:
    - run: npm install -g typescript eslint prettier
  workspace:
    mountPath: /workspace
  network:
    expose: [3000, 5173]
