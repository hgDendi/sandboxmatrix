apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sandboxmatrix.fullname" . }}-operator
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "sandboxmatrix.fullname" . }}-operator
    app.kubernetes.io/name: {{ include "sandboxmatrix.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: sandboxmatrix
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "sandboxmatrix.fullname" . }}-operator
  template:
    metadata:
      labels:
        app: {{ include "sandboxmatrix.fullname" . }}-operator
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: operator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["smx", "operator", "start"]
          args:
            - "--namespace={{ .Values.operator.watchNamespace }}"
            {{- range .Values.operator.args }}
            - {{ . | quote }}
            {{- end }}
          env:
            - name: SMX_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
