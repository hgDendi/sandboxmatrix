apiVersion: v1
kind: Service
metadata:
  name: {{ include "sandboxmatrix.fullname" . }}-operator
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "sandboxmatrix.fullname" . }}-operator
    app.kubernetes.io/name: {{ include "sandboxmatrix.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: sandboxmatrix
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
      name: health
  selector:
    app: {{ include "sandboxmatrix.fullname" . }}-operator
