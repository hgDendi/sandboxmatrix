apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sandboxes.smx.sandboxmatrix.dev
spec:
  group: smx.sandboxmatrix.dev
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                blueprintRef:
                  type: string
                resources:
                  type: object
                  properties:
                    cpu:
                      type: string
                    memory:
                      type: string
                    disk:
                      type: string
                workspace:
                  type: object
                  properties:
                    mountPath:
                      type: string
                    source:
                      type: string
            status:
              type: object
              properties:
                state:
                  type: string
                runtimeID:
                  type: string
                ip:
                  type: string
                message:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: State
          type: string
          jsonPath: .status.state
        - name: Blueprint
          type: string
          jsonPath: .spec.blueprintRef
        - name: IP
          type: string
          jsonPath: .status.ip
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: sandboxes
    singular: sandbox
    kind: Sandbox
    shortNames:
      - sb
