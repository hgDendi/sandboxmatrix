apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: matrices.smx.sandboxmatrix.dev
spec:
  group: smx.sandboxmatrix.dev
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                members:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      blueprint:
                        type: string
                    required:
                      - name
                      - blueprint
                networkIsolation:
                  type: boolean
                  description: "When true, matrix sandboxes share an isolated network."
            status:
              type: object
              properties:
                state:
                  type: string
                memberStatuses:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      sandboxRef:
                        type: string
                      state:
                        type: string
                message:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: State
          type: string
          jsonPath: .status.state
        - name: Members
          type: integer
          jsonPath: .spec.members
          description: "Number of member sandboxes"
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: matrices
    singular: matrix
    kind: Matrix
    shortNames:
      - mx
