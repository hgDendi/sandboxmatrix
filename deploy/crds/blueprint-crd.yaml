apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: blueprints.smx.sandboxmatrix.dev
spec:
  group: smx.sandboxmatrix.dev
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                base:
                  type: string
                  description: "Base container image for the sandbox."
                runtime:
                  type: string
                  description: "Runtime backend (e.g. docker, firecracker)."
                resources:
                  type: object
                  properties:
                    cpu:
                      type: string
                    memory:
                      type: string
                    disk:
                      type: string
                    gpu:
                      type: object
                      properties:
                        count:
                          type: integer
                        driver:
                          type: string
                setup:
                  type: array
                  items:
                    type: object
                    properties:
                      run:
                        type: string
                    required:
                      - run
                toolchains:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      image:
                        type: string
                    required:
                      - name
                      - image
                workspace:
                  type: object
                  properties:
                    mountPath:
                      type: string
                    source:
                      type: string
                    readOnly:
                      type: boolean
                network:
                  type: object
                  properties:
                    expose:
                      type: array
                      items:
                        type: integer
                    policy:
                      type: string
                      enum:
                        - none
                        - host
                        - bridge
                        - isolate
                    allowDNS:
                      type: boolean
              required:
                - base
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Base
          type: string
          jsonPath: .spec.base
        - name: Runtime
          type: string
          jsonPath: .spec.runtime
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: blueprints
    singular: blueprint
    kind: Blueprint
    shortNames:
      - bp
